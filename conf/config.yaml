
defaults:
  - _self_ 
  - task: mnist                   # options are mnist, fmnist, penn_treebank, selective_copying (change model to nanoGPT if you choose penn_treebank or selective_copying)
  - optimizer: default            
  - model: basic_mlp              # options are basic_mlp, nanoGPT
  - logger: wandb
  - pruning: basic
  - corruption: basic
  - trainer: default
  - trainer/callbacks: early_stopping
  - hydra: default
  - hparams_search: null

save_dir: logs/
seed: null
task_name: "train"
